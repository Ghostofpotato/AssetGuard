services:
  assetguard.indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: assetguard.indexer
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "bootstrap.memory_lock=true"
      - "OPENSEARCH_PASSWORD=SecretPassword"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - assetguard-indexer-data:/var/lib/wazuh-indexer

  assetguard.manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: assetguard.manager
    hostname: wazuh.manager
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - SSL_CERTIFICATE_AUTHORITIES=""
      - SSL_CERTIFICATE=""
      - SSL_KEY=""
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - assetguard-manager-data:/var/ossec
    depends_on:
      - assetguard.indexer

  assetguard.dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: assetguard.dashboard
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
      - SERVER_SSL_ENABLED=false
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
    depends_on:
      - assetguard.indexer
      - assetguard.manager
    volumes:
      - assetguard-dashboard-data:/usr/share/wazuh-dashboard/data

volumes:
  assetguard-indexer-data:
  assetguard-manager-data:
  assetguard-dashboard-data:

networks:
  default:
    name: assetguard-net