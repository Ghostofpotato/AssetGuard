version: '3.8'

services:
  assetguard.indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: assetguard.indexer
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - assetguard-indexer-data:/var/lib/wazuh-indexer

  assetguard.manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: assetguard.manager
    hostname: wazuh.manager
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    volumes:
      - assetguard-manager-data:/var/ossec
    depends_on:
      - assetguard.indexer

  assetguard.dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: assetguard.dashboard
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - WAZUH_API_URL=https://wazuh.manager
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
    depends_on:
      - assetguard.indexer
      - assetguard.manager
    volumes:
      - assetguard-dashboard-data:/usr/share/wazuh-dashboard/data

volumes:
  assetguard-indexer-data:
  assetguard-manager-data:
  assetguard-dashboard-data:

networks:
  default:
    name: assetguard-net