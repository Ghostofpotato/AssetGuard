services:
  assetguard-master:
    build:
      context: .
      dockerfile: base/manager/manager.Dockerfile
    image: integration_test_assetguard-manager
    hostname: assetguard-master
    ports:
      - "55000:55000"
    volumes:
      - api_security:/var/assetguard-manager/api/configuration/security
      - api_ssl:/var/assetguard-manager/api/configuration/ssl
      - ./configurations/tmp/manager:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - assetguard-master
      - master-node
      - master

  assetguard-worker1:
    image: integration_test_assetguard-manager
    hostname: assetguard-worker1
    ports:
      - "55001:55000"
    volumes:
      - api_security:/var/assetguard-manager/api/configuration/security
      - api_ssl:/var/assetguard-manager/api/configuration/ssl
      - ./configurations/tmp/manager:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - assetguard-master
      - worker1
      - worker
    depends_on:
      - assetguard-master

  assetguard-worker2:
    image: integration_test_assetguard-manager
    hostname: assetguard-worker2
    ports:
      - "55002:55000"
    volumes:
      - api_security:/var/assetguard-manager/api/configuration/security
      - api_ssl:/var/assetguard-manager/api/configuration/ssl
      - ./configurations/tmp/manager:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - assetguard-master
      - worker2
      - worker
    depends_on:
      - assetguard-master

  assetguard-agent1:
    build:
      context: .
      dockerfile: base/agent/new.Dockerfile
    image: integration_test_assetguard-agent
    hostname: assetguard-agent1
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent1
    depends_on:
      - haproxy-lb

  assetguard-agent2:
    image: integration_test_assetguard-agent
    hostname: assetguard-agent2
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent2
    depends_on:
      - assetguard-agent1
      - haproxy-lb

  assetguard-agent3:
    image: integration_test_assetguard-agent
    hostname: assetguard-agent3
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent3
    depends_on:
      - assetguard-agent2
      - haproxy-lb

  assetguard-agent4:
    image: integration_test_assetguard-agent
    hostname: assetguard-agent4
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent4
    depends_on:
      - assetguard-agent3
      - haproxy-lb

  assetguard-agent5:
    build:
      context: .
      dockerfile: base/agent/old.Dockerfile
    image: integration_test_assetguard-agent_old
    hostname: assetguard-agent5
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent5
      - agent_old
    depends_on:
      - assetguard-agent4
      - haproxy-lb

  assetguard-agent6:
    image: integration_test_assetguard-agent_old
    hostname: assetguard-agent6
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent6
      - agent_old
    depends_on:
      - assetguard-agent5
      - haproxy-lb

  assetguard-agent7:
    image: integration_test_assetguard-agent_old
    hostname: assetguard-agent7
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent7
      - agent_old
    depends_on:
      - assetguard-agent6
      - haproxy-lb

  assetguard-agent8:
    image: integration_test_assetguard-agent_old
    hostname: assetguard-agent8
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - assetguard-agent8
      - agent_old
    depends_on:
      - assetguard-agent7
      - haproxy-lb

  haproxy-lb:
    build:
      context: ./base/haproxy-lb
    image: integration_test_haproxy-lb
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55010:55000"
    entrypoint:
      - /scripts/entrypoint.sh
    depends_on:
      - assetguard-master
      - assetguard-worker1
      - assetguard-worker2

  cti:
    build:
      context: ./base/cti
    image: integration_test_cti
    restart: always
    environment:
      - PORT=4041

volumes:
  api_ssl:
  api_security:
